name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs of the same branch — saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Type check server
        run: npx tsc --noEmit

      - name: Setup Node (client)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Type check client
        working-directory: client
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint client
        working-directory: client
        # Only lint errors block the build; warnings (legacy any/exhaustive-deps) are tracked but non-fatal.
        run: npx eslint .

  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        # Placeholder VITE_API_URL so build doesn't fail when prod var missing in CI.
        env:
          VITE_API_URL: https://placeholder.invalid
          VITE_APP_URL: https://placeholder.invalid
        run: npm run build
