name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs of the same branch — saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        # Don't block CI on lint warnings, but surface errors loudly.
        run: npx eslint . --max-warnings=9999

      - name: Run tests
        run: npm test

      - name: Build
        # Placeholder VITE_API_URL so build doesn't fail when prod var missing in CI.
        env:
          VITE_API_URL: https://placeholder.invalid
          VITE_APP_URL: https://placeholder.invalid
        run: npm run build
