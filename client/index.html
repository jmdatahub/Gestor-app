    <meta name="theme-color" content="#0A0A0A" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mi Panel Financiero" />
    <meta property="og:description" content="Controla tus ingresos, gastos e inversiones desde un solo lugar." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mi Panel Financiero" />
    <meta name="twitter:description" content="Controla tus ingresos, gastos e inversiones desde un solo lugar." />
    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://pruiccptamjzemedwhdq.supabase.co" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Bootstrap design + theme BEFORE React mounts to avoid FOUC.
      (function () {
        try {
          // Migration: if we previously defaulted to 'crafted' silently,
          // reset that selection so users see 'original' (their original look).
          // Their explicit picks via Settings keep working from here on.
          if (!localStorage.getItem('design_v2_initialized')) {
            if (localStorage.getItem('app_design') === 'crafted') {
              localStorage.removeItem('app_design');
            }
            localStorage.setItem('design_v2_initialized', '1');
          }
          var d = localStorage.getItem('app_design') || 'original';
          var t = localStorage.getItem('app_theme') || 'light';
          document.documentElement.setAttribute('data-design', d);
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-design', 'original');
        }
      })();
    </script>
    <title>Mi Panel Financiero</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
